name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Lint code
  run: flake8 . --max-line-length=120 --extend-ignore=E302,E501
    - name: Run tests
      run: |
        pytest --cov=demo_ecommerce

    - name: Build Docker image
      run: |
        docker build -t ecommerce-app .

    - name: Deploy to Render
      if: success()
      run: |
        curl -X POST ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
